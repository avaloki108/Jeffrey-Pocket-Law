name: android_app
description: "Pocket Lawyer - Legal AI Assistant"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^3.2.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  provider: ^6.0.0
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1

  # Networking
  dio: ^5.9.0
  http: ^1.2.2

  # Storage / security
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  pointycastle: ^4.0.0
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1

  # Config / UI
  flutter_dotenv: ^6.0.0
  flutter_markdown: ^0.7.4+1
  cached_network_image: ^3.4.1
  lottie: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0

  # Firebase / Ads (already in your repo)
  firebase_core: ^4.2.1
  firebase_analytics: ^12.0.4
  firebase_crashlytics: ^5.0.5
  firebase_data_connect: ^0.3.0
  google_mobile_ads: ^8.0.0

  # Viral growth features
  in_app_review: ^2.0.9
  share_plus: ^12.0.1
  url_launcher: ^6.3.1
  firebase_auth: ^6.1.2
  flutter_secure_storage_platform_interface: ^2.0.1
  flutter_secure_storage_web: ^2.1.0
  flutter_secure_storage_windows: ^4.1.0
  google_sign_in: ^7.2.0
  google_sign_in_android: ^7.2.10
  google_sign_in_ios: ^6.3.0
  google_sign_in_platform_interface: ^3.1.0
  google_sign_in_web: ^1.1.3
  googleapis_auth: ^1.6.0
  cloud_firestore: ^6.1.0
  firebase_ai: ^3.6.0
  mixpanel_flutter: ^2.2.0
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  firebase_core_platform_interface: ^6.0.2

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - test_env
    - assets/images/logo.png
    - assets/images/jeffrey-app-icon.png
    - assets/images/jeffrey_05.png
    - assets/images/jeffrey_gold_06.png
    - assets/images/jeffrey_final-mashed.png
