name: iOS Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./android-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ========================================================
      # INJECT SECRETS INTO .ENV
      # ========================================================
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "COURTLISTENER_API_KEY=${{ secrets.COURTLISTENER_API_KEY }}" >> .env
          echo "LEGISCAN_API_KEY=${{ secrets.LEGISCAN_API_KEY }}" >> .env
          echo "CONGRESS_GOV_API_KEY=${{ secrets.CONGRESS_GOV_API_KEY }}" >> .env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
          
          ls -la .env

      # ========================================================
      # INJECT FIREBASE GoogleService-Info.plist
      # Store the entire plist content as a secret named
      # GOOGLE_SERVICE_INFO_PLIST in your GitHub repo settings
      # ========================================================
      - name: Create GoogleService-Info.plist
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' > ios/Runner/GoogleService-Info.plist
        if: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST != '' }}

      - name: Get Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # Run Flutter tests
      - name: Run Tests
        run: flutter test

      # Build iOS (Debug mode - no signing required)
      - name: Build iOS (Debug - No Codesign)
        run: flutter build ios --debug --no-codesign

      # Upload the build output
      - name: Upload iOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-build
          path: android-app/build/ios/iphoneos/

  # Optional: iOS Release build with signing (requires additional secrets)
  release-build:
    runs-on: macos-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
