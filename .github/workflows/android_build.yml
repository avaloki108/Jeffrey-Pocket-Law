name: Android Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-app # Points to your Flutter project folder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # You can specify a version here if needed, e.g., flutter-version: '3.19.0'

      # ========================================================
      # CRITICAL STEP: INJECT SECRETS INTO .ENV
      # This recreates the .env file on the build server using
      # the encrypted secrets you added to GitHub.
      # ========================================================
      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          echo "COURTLISTENER_API_KEY=${{ secrets.COURTLISTENER_API_KEY }}" >> .env
          echo "LEGISCAN_API_KEY=${{ secrets.LEGISCAN_API_KEY }}" >> .env
          echo "CONGRESS_GOV_API_KEY=${{ secrets.CONGRESS_GOV_API_KEY }}" >> .env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
          
          # Optional: Verify file exists (but don't print content!)
          ls -la .env

      # ========================================================
      # CRITICAL: Inject Firebase google-services.json
      # Store the entire JSON file content as a secret named
      # GOOGLE_SERVICES_JSON in your GitHub repo settings
      # ========================================================
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Get Dependencies
        run: flutter pub get

      # Uncomment this if you have unit tests
      # - name: Run Tests
      #   run: flutter test

      # Build the APK (Debug mode for now to avoid keystore complexity)
      # If you have signing set up, change to --release
      - name: Build APK
        run: flutter build apk --debug

      # Upload the APK so you can download it from GitHub Actions
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-app/build/app/outputs/apk/debug/app-debug.apk